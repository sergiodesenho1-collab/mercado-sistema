<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caixa PDV</title>

    <link rel="stylesheet" href="../css/caixa.css" />
  </head>
  <body>
    <div class="container">
      <h1>🛒 Caixa PDV</h1>

      <input
        type="text"
        id="codigoBarra"
        placeholder="Passe o código de barras"
        autofocus
      />

      <button onclick="buscarProduto()">Adicionar</button>

      <h2>Carrinho</h2>

      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Qtd</th>
            <th>Preço Unit.</th>
            <th>Subtotal</th>
          </tr>
        </thead>

        <tbody id="carrinho"></tbody>
      </table>

      <h2 id="total">Total: R$ 0,00</h2>

      <button class="finalizar" onclick="finalizarVenda()">
        Finalizar Venda
      </button>
    </div>

    <script src="../js/caixa.js"></script>
  </body>
</html>
